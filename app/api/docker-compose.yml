services:

  api:
    build:
      context: ../..
      dockerfile: app/api/Dockerfile

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    restart: always

  worker:
    build:
      context: ../..
      dockerfile: app/api/Dockerfile

    command: python -m app.worker

    depends_on:
      - postgres
      - redis

    restart: always

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: transactions_db

    ports:
      - "5432:5432"

    restart: always

  redis:
    image: redis:7

    ports:
      - "6379:6379"

    restart: always